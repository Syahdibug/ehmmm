name: wongirengjembuten365
description: "Sikma"
publish_to: 'none'
version: 4.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.5
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0
  carousel_slider: 4.0.0
  web_socket_channel: ^2.4.0
  network_info_plus: ^4.1.0
  permission_handler: ^11.0.0
  video_player: ^2.8.6
  webview_flutter: ^4.4.2
  shimmer: ^3.0.0
  socket_io_client: ^2.0.3
  battery_plus: ^4.0.0
  audioplayers: ^5.2.1
  intl: ^0.19.0
  font_awesome_flutter: ^10.10.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4

dev_dependencies:
  flutter_launcher_icons: ^0.13.1 # versi terbaru saat ini
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: assets/icon/icon.jpg
  image_path_ios: assets/icon/icon/icon.jpg
  image_path: assets/icon/icon.jpg
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/title.png
    - assets/images/bokep.png
    - assets/images/logo.png
    - assets/videos/load.mp4
    - assets/videos/banner.mp4
    - assets/images/news1.jpg
    - assets/images/news2.jpg
    - assets/images/news3.jpg
    - assets/images/news4.jpg
    - assets/images/news5.jpg

  fonts:
    - family: MADEEvolveSansEVO
      fonts:
        - asset: fonts/MADEEvolveSansEVO.ttf
    - family: ShareTechMono
      fonts:
        - asset: fonts/ShareTechMono-Regular.ttf
